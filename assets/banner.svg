<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a14" />
    </linearGradient>

    <!-- Glow/Neon Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b176ff" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f2fe" stroke-opacity="0.04" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Neural Network Visuals (Left/Right margins) -->
  <g opacity="0.8">
    <!-- Connections (Lines) -->
    <line x1="100" y1="100" x2="250" y2="150" stroke="#00f2fe" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="8, 8" />
    <line x1="100" y1="200" x2="250" y2="150" stroke="#ff0844" stroke-opacity="0.3" stroke-width="1.5" />
    <line x1="100" y1="300" x2="250" y2="250" stroke="#b176ff" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="8, 8" />
    <line x1="250" y1="150" x2="400" y2="200" stroke="#00f2fe" stroke-opacity="0.3" stroke-width="2" />
    <line x1="250" y1="250" x2="400" y2="200" stroke="#b176ff" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="8, 8" />

    <!-- Feature Map Box (Convolutional Visual representation) -->
    <g transform="translate(850, 80)">
      <!-- Feature maps stacked -->
      <rect x="40" y="40" width="100" height="100" fill="#b176ff" fill-opacity="0.1" stroke="url(#neonPurple)" stroke-width="1.5" rx="5" />
      <rect x="20" y="20" width="100" height="100" fill="#ff0844" fill-opacity="0.1" stroke="url(#neonPink)" stroke-width="1.5" rx="5" />
      <rect x="0" y="0" width="100" height="100" fill="#00f2fe" fill-opacity="0.1" stroke="url(#neonCyan)" stroke-width="1.5" rx="5" />
      
      <!-- Scan line Glow -->
      <line x1="-5" y1="40" x2="105" y2="40" stroke="#00f2fe" stroke-width="6" opacity="0.3" />
      <!-- Scan line Core -->
      <line x1="-5" y1="40" x2="105" y2="40" stroke="#ffffff" stroke-width="2" opacity="0.9" />
    </g>

    <!-- Nodes (Circles) -->
    <!-- Node 1: Cyan Glow + Core -->
    <circle cx="100" cy="100" r="14" fill="#00f2fe" opacity="0.25" />
    <circle cx="100" cy="100" r="8" fill="url(#neonCyan)" />

    <!-- Node 2: Pink (No Glow) -->
    <circle cx="100" cy="200" r="6" fill="url(#neonPink)" />

    <!-- Node 3: Purple Glow + Core -->
    <circle cx="100" cy="300" r="14" fill="#b176ff" opacity="0.25" />
    <circle cx="100" cy="300" r="8" fill="url(#neonPurple)" />

    <!-- Node 4: Cyan Glow + Core -->
    <circle cx="250" cy="150" r="16" fill="#00f2fe" opacity="0.25" />
    <circle cx="250" cy="150" r="10" fill="url(#neonCyan)" />

    <!-- Node 5: Purple -->
    <circle cx="250" cy="250" r="8" fill="url(#neonPurple)" />

    <!-- Node 6: Pink Glow + Core -->
    <circle cx="400" cy="200" r="18" fill="#ff0844" opacity="0.25" />
    <circle cx="400" cy="200" r="12" fill="url(#neonPink)" />
  </g>

  <!-- Title & Subtitle -->
  <g transform="translate(600, 200)" text-anchor="middle">
    <!-- Title Glow Layer -->
    <text y="-20" font-family="Outfit, Inter, Segoe UI, sans-serif" font-weight="800" font-size="52" fill="none" stroke="#00f2fe" stroke-width="8" opacity="0.4" letter-spacing="1.5">
      Awesome CNNs
    </text>
    <!-- Title Core Layer -->
    <text y="-20" font-family="Outfit, Inter, Segoe UI, sans-serif" font-weight="800" font-size="52" fill="#ffffff" letter-spacing="1.5">
      Awesome CNNs
    </text>
    
    <!-- Subtitle -->
    <text y="35" font-family="Inter, Segoe UI, sans-serif" font-weight="400" font-size="20" fill="#a0aec0" letter-spacing="4">
      EVOLUTION • VARIANTS • APPLICATIONS
    </text>
    
    <!-- Subtitle 2 -->
    <text y="70" font-family="Inter, Segoe UI, sans-serif" font-weight="300" font-style="italic" font-size="14" fill="#00f2fe" letter-spacing="1">
      Deep Learning Architectures & Visual Feature Extractors
    </text>
  </g>

</svg>
